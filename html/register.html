<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <title>បង្កើតគណនី</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="card register-card">
            <h1>បង្កើតគណនី</h1>
            <p>
                ចូលរួមជាមួយ សិក្សាតាម Online ដើម្បីរៀនជំនាញថ្មីៗ
            </p>
            <form>
                <label>ឈ្មោះពេញ</label>
                <input type="text" placeholder="បញ្ចូលឈ្មោះពេញ">

                <label>អ៊ីមែល</label>
                <input type="email" placeholder="បញ្ចូលអ៊ីមែល">

                <label>លេខទូរស័ព្ទ</label>
                <input type="text" placeholder="បញ្ចូលលេខទូរស័ព្ទ">

                <label>ពាក្យសម្ងាត់</label>
                <input type="password" placeholder="បញ្ចូលពាក្យសម្ងាត់">

                <label>បញ្ជាក់ពាក្យសម្ងាត់</label>
                <input type="password" placeholder="បញ្ចូលពាក្យសម្ងាត់ម្តងទៀត">

                <!-- <div class="option">
                    <label>
                        <input type="checkbox">
                        ខ្ញុំយល់ព្រមលើលក្ខខណ្ឌប្រើប្រាស់
                    </label>
                </div> -->

                <button>
                    បង្កើតគណនី
                </button>
            </form>

            <div class="line">
                <span>ឬ</span>
            </div>

            <button class="google">
                ចុះឈ្មោះជាមួយ Google
            </button>

            <p class="bottom">
                មានគណនីរួចហើយ?
                <a href="login.html">
                    ចូលគណនី
                </a>
            </p>
        </div>
    </div>
</body>

</html>
