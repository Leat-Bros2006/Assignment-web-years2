<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <title>បង្កើតគណនី</title>
    <link rel="icon" type="logos/png" href="../images/logos.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="card register-card">
            <h1>បង្កើតគណនី</h1>
            <p>
                ចូលរួមជាមួយ សិក្សាតាម Online ដើម្បីរៀនជំនាញថ្មីៗ
            </p>
            <form id="registerForm">
                <label>ឈ្មោះពេញ</label>
                <input id="fullname" type="text" placeholder="បញ្ចូលឈ្មោះពេញ">

                <label>អ៊ីមែល</label>
                <input id="email" type="email" placeholder="បញ្ចូលអ៊ីមែល">

                <label>លេខទូរស័ព្ទ</label>
                <input id="phone" type="text" placeholder="បញ្ចូលលេខទូរស័ព្ទ">

                <label>ពាក្យសម្ងាត់</label>
                <input id="password" type="password" placeholder="បញ្ចូលពាក្យសម្ងាត់">

                <label>បញ្ជាក់ពាក្យសម្ងាត់</label>
                <input id="confirmPassword" type="password" placeholder="បញ្ចូលពាក្យសម្ងាត់ម្តងទៀត">
                <p id="passwordError"></p>
                <p id="successMessage"></p>
                <button type="submit">បង្កើតគណនី</button>
            </form>

            <div class="line">
                <span>ឬ</span>
            </div>

            <button class="google">
                ចុះឈ្មោះជាមួយ Google
            </button>

            <p class="bottom">
                មានគណនីរួចហើយ?
                <a href="login.html">
                    ចូលគណនី
                </a>
            </p>
        </div>
    </div>
</body>
<script src="../js/register.js"></script>
</html>
