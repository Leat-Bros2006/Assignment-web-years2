<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <title>ចូលគណនី</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>ចូលគណនី</h1>
            <p>សូមស្វាគមន៍មកកាន់ការសិក្សាតាម Online</p>
            <form id="get_form">
                <label>អ៊ីមែល</label>
                <input id="email" type="email" placeholder="បញ្ចូលអ៊ីមែល">
                <label>ពាក្យសម្ងាត់</label>
                <input id="password" type="password" placeholder="បញ្ចូលពាក្យសម្ងាត់">
                <div class="option">
                    <div class="remember">
                        <input id="checkbod" type="checkbox">
                        <span>ចង់ចាំខ្ញុំ</span>
                    </div>
                    <a href="#">
                        ភ្លេចពាក្យសម្ងាត់?
                    </a>
                </div>
                <button type="submit">ចូលគណនី</button>
            </form>
            <div class="line">
                <span>ឬ</span>
            </div>
            <button class="google">
                ចូលជាមួយ Google
            </button>
            <p class="bottom">
                មិនទាន់មានគណនី?
                <a href="register.html">
                    បង្កើតគណនី
                </a>
            </p>
        </div>
    </div>
</body>
<script src="../js/login.js"></script>

</html>
