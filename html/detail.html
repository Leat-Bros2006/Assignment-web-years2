<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Detail</title>
    <link rel="icon" type="logos.png" href="../images/logos.png">
    <link rel="stylesheet" href="../css//detail.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <section class="detail-container">
        <div class="detail-image">
            <img id="image">
        </div>
        <div class="detail-info">
            <p class="category" id="category"></p>
            <h1 id="title"></h1>
            <h3 id="titleKh"></h3>
            <div class="meta">
                <span>⭐ <span id="rating"></span></span>
                <span>👨‍🎓 <span id="students"></span></span>
                <span>⏱️ <span id="duration"></span></span>
            </div>
            <p class="level" id="level"></p>
            <h2><span id="price"></span></h2>
            <button class="buy-btn" id="enrollBtn">
                ចុះឈ្មោះរៀន
            </button>
        </div>
    </section>
    <script type="module" src="../js/detail.js"></script>
</body>

</html>
