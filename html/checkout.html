<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/checkout.css">
</head>

<body>
    <div class="checkout-card">
        <h2>បង់ប្រាក់វគ្គសិក្សា</h2>
        <div class="course">
            <img id="courseImage" src="" alt="Course">
            <div>
                <h3 id="courseTitle"></h3>
                <p id="courseCategory"></p>
            </div>
        </div>
        <div class="price">
            <div class="row">
                <span>តម្លៃវគ្គ</span>
                <span id="coursePrice"></span>
            </div>
            <div class="row">
                <span>បញ្ចុះតម្លៃ</span>
                <span>$0</span>
            </div>
            <div class="row total">
                <span>សរុប</span>
                <span id="courseTotal"></span>
            </div>

        </div>
        <button id="payBtn">
            បង់ប្រាក់ឥឡូវនេះ
        </button>
        <p id="message"></p>
    </div>
    <script type="module" src="../js/checkout.js"></script>
</body>

</html>
